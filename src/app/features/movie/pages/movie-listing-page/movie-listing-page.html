<div>
  <label for="title-search-input"> Title: </label>
  <input type="text" id="title-search-input" [(ngModel)]="movieTitleSearch" />
  <button (click)="onClickSearch()">Seach</button>
</div>

@if(movies().length){
<ul>
  @for(movie of movies(); track movie.id){
  <!-- <li>
    {{movie.id}} - {{movie.title}}
    <img [src]="movie.img_url" alt="Affiche de {{movie.title}}" />
  </li> -->
  <li>
    <app-movie-card [movieInput]="movie" (likeEvent)="onLikeEvent($event)" />
  </li>
  }
</ul>
} @if(!movies().length && !moviesError()){
<p>Loading</p>
} @if(!movies().length && moviesError()){
<p>Something wrong happened</p>
}
